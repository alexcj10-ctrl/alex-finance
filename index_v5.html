<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#071624">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Alex Finance</title>
<style>
:root{--bg:#06131f;--panel:#0d2435;--panel2:#091c2a;--line:#28516d;--text:#f2f8ff;--muted:#92aabd;--cyan:#47ddd5;--green:#69eba0;--red:#ff8089;--amber:#f2c965;--violet:#c9b6ff}
*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:radial-gradient(circle at 50% -10%,#123d57 0,#071624 36%,var(--bg) 68%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;min-height:100vh}
button,input,select{font:inherit}.app{max-width:720px;margin:auto;padding:18px 16px 110px}.top{display:flex;align-items:center;justify-content:space-between;margin:5px 0 16px}.brand{font-size:29px;font-weight:900;letter-spacing:-.065em}.brand span{color:var(--cyan)}.sub{color:var(--muted);font-size:12px;margin-top:6px}.iconbtn,.monthnav button{border:1px solid var(--line);background:#113149;color:var(--cyan);border-radius:15px;font-weight:900}.iconbtn{padding:11px 13px;font-size:17px}
.panel{background:linear-gradient(145deg,rgba(16,43,62,.97),rgba(9,29,43,.98));border:1px solid rgba(65,113,145,.65);box-shadow:0 14px 35px rgba(0,0,0,.22);border-radius:24px;padding:18px;margin:13px 0}.hero{background:linear-gradient(145deg,#174761,#102b40)}.eyebrow{color:var(--cyan);font-size:10px;font-weight:900;letter-spacing:.13em;text-transform:uppercase}.amount{font-size:47px;line-height:1;font-weight:900;letter-spacing:-.065em;margin-top:10px}h2{font-size:22px;letter-spacing:-.04em;margin:0 0 8px}p{color:var(--muted);line-height:1.42;margin:7px 0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.card{background:rgba(6,24,37,.78);border:1px solid var(--line);border-radius:18px;padding:14px}.card span{display:block;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.07em;text-transform:uppercase}.card strong{display:block;font-size:22px;letter-spacing:-.04em;margin-top:7px}.card small{display:block;color:var(--muted);font-size:11px;line-height:1.35;margin-top:6px}
.monthnav{display:grid;grid-template-columns:50px 1fr 50px;gap:9px;align-items:center;margin:5px 0 14px}.monthnav button{height:50px;font-size:28px}.monthnav button:disabled{opacity:.25}.monthbox{background:var(--panel);border:1px solid var(--line);border-radius:17px;padding:10px;text-align:center}.monthbox small{display:block;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.monthbox b{display:block;margin-top:3px;font-size:20px}.row{display:flex;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid rgba(49,88,113,.7)}.row:last-child{border-bottom:0}.row b{font-size:16px}.row small{display:block;color:var(--muted);margin-top:4px;line-height:1.35}.right{text-align:right;font-size:17px;font-weight:900;min-width:92px}.positive{color:var(--green)}.negative{color:var(--red)}.amber{color:var(--amber)}.violet{color:var(--violet)}
.flow{display:grid;gap:8px;margin-top:14px}.flowrow{display:flex;justify-content:space-between;align-items:center;padding:12px 13px;background:rgba(5,22,33,.68);border:1px solid rgba(44,86,116,.75);border-radius:15px}.flowrow span{color:var(--muted);font-size:13px}.flowrow b{font-size:18px}.flowarrow{text-align:center;color:#5c8198;font-size:16px;line-height:1}.freebox{border-color:#3b9970;background:linear-gradient(145deg,rgba(27,89,67,.65),rgba(8,42,39,.7))}
.bar{height:9px;border-radius:999px;background:#06131f;overflow:hidden;margin-top:12px}.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--green))}.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field label{display:block;color:var(--muted);font-size:10px;font-weight:900;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}input,select{width:100%;background:#071a29;color:var(--text);border:1px solid var(--line);border-radius:13px;padding:12px;font-size:16px;outline:none}.hint{font-size:11px;color:var(--muted);margin-top:5px}.primary,.secondary,.danger,.paidbtn{border-radius:13px;font-weight:900}.primary{width:100%;border:0;padding:13px;background:var(--cyan);color:#06202d;margin-top:12px}.secondary{border:1px solid var(--line);background:#13374f;color:var(--cyan);padding:10px 12px}.danger{border:0;background:#57212b;color:#ffb6bc;padding:7px 9px;font-size:12px}.paidbtn{border:1px solid var(--line);padding:8px 10px;background:#102f45;color:var(--amber);font-size:12px}.paidbtn.done{background:#173e32;color:var(--green);border-color:#327659}.notice{background:#0d3342;border:1px solid #2e7382;border-radius:15px;padding:12px;color:#d7f2f2;font-size:13px;line-height:1.45;margin-top:11px}
.summarywrap{display:grid;grid-template-columns:190px 1fr;gap:18px;align-items:center}.donut{width:184px;height:184px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line)}.donut .hole{width:112px;height:112px;border-radius:50%;background:#091e2d;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.donut span{color:var(--muted);font-size:10px;font-weight:900}.donut strong{font-size:22px}.legendrow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}.dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:4px}.legendleft{display:flex;gap:9px}.legendtext small{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.tabs{position:fixed;left:0;right:0;bottom:0;background:#071827ef;border-top:1px solid var(--line);backdrop-filter:blur(16px);display:flex;justify-content:center;gap:4px;padding:10px max(10px,env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));z-index:20}.tabs button{border:0;background:transparent;color:var(--muted);padding:12px 15px;border-radius:14px;font-size:14px;font-weight:900}.tabs button.active{background:#173b54;color:var(--cyan)}.version{text-align:center;color:#58778c;font-size:10px;margin:18px 0 0}
@media(max-width:520px){.summarywrap{grid-template-columns:1fr}.donut{margin:auto}.amount{font-size:43px}}@media(max-width:390px){.app{padding-left:12px;padding-right:12px}.tabs button{padding:12px 10px}.fields{grid-template-columns:1fr}.amount{font-size:39px}.right{min-width:78px}}
</style>
</head>
<body>
<div class="app"><div class="top"><div><div class="brand">Alex <span>Finance</span></div><div class="sub">la tua libertà economica reale</div></div><button class="iconbtn" onclick="setPage('base')">⚙︎</button></div><main id="view"></main><div class="version">Alex Finance 5.0</div></div>
<nav class="tabs"><button data-page="home" class="active">Dashboard</button><button data-page="plan">Piano</button><button data-page="expenses">Spese</button><button data-page="base">Base</button></nav>
<script>
const MONTHS=['Luglio 2026','Agosto 2026','Settembre 2026','Ottobre 2026','Novembre 2026','Dicembre 2026','Gennaio 2027','Febbraio 2027','Marzo 2027','Aprile 2027','Maggio 2027','Giugno 2027','Luglio 2027','Agosto 2027','Settembre 2027','Ottobre 2027','Novembre 2027','Dicembre 2027'];
const KEY='alex-finance-5-0',OLD_KEYS=[];
const BASES=[['benzina','Benzina'],['pedaggi','Pedaggi'],['assicurazione','Assicurazione auto'],['bonifico','Bonifico personale'],['cibo','Cibo essenziale'],['telefono','Telefono, app e banca'],['altri','Altri fissi minimi']];
const CATMAP={benzina:'Benzina',pedaggi:'Pedaggi',assicurazione:'Assicurazione',bonifico:'Bonifico personale',cibo:'Cibo',telefono:'Telefono/app/banca',altri:'Altro'};
const initial={
  operatingMonth:'Luglio 2026',selected:'Luglio 2026',capitalSnapshot:1740,
  futureReserveSnapshot:1400,fixed:800,
  base:{benzina:470,pedaggi:50,assicurazione:120,bonifico:275,cibo:250,telefono:50,altri:0},
  plannedSpent:{'Luglio 2026':{benzina:310,pedaggi:21,assicurazione:0,bonifico:275,cibo:250,telefono:50,altri:0}},
  commissions:Object.fromEntries(MONTHS.map(m=>[m,0])),expenses:[]
};
initial.commissions['Agosto 2026']=600;
initial.commissions['Settembre 2026']=600;
initial.commissions['Ottobre 2026']=250;
function clone(x){return JSON.parse(JSON.stringify(x))}function money(v){if(typeof v==='number')return v;let s=String(v??'').trim().replace(/\s/g,'');if(!s)return 0;if(s.includes(',')&&s.includes('.'))s=s.lastIndexOf(',')>s.lastIndexOf('.')?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'');else if(s.includes(','))s=s.replace(',','.');return Number(s)||0}function euro(n){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:2}).format(money(n))}
function load(){try{const raw=localStorage.getItem(KEY);if(!raw)return clone(initial);const old=JSON.parse(raw);const s={...clone(initial),...old,operatingMonth:old.operatingMonth||old.startMonth||initial.operatingMonth,base:{...initial.base,...(old.base||{})},commissions:{...initial.commissions,...(old.commissions||{})},plannedSpent:old.plannedSpent||clone(initial.plannedSpent),expenses:Array.isArray(old.expenses)?old.expenses:[]};s.expenses=s.expenses.map((e,i)=>({id:e.id||'exp_'+Date.now()+'_'+i,createdAt:e.createdAt||new Date().toISOString(),...e}));return s}catch(e){return clone(initial)}}
let state=load();function save(){localStorage.setItem(KEY,JSON.stringify(state))}function idx(m=state.selected){return MONTHS.indexOf(m)}function opIdx(){return Math.max(0,MONTHS.indexOf(state.operatingMonth))}function target(){return 1500}function deviceMonth(){const s=new Date().toLocaleDateString('it-IT',{month:'long',year:'numeric'});return s.charAt(0).toUpperCase()+s.slice(1)}
function syncOperatingMonth(){const real=deviceMonth(),ri=MONTHS.indexOf(real),oi=opIdx();if(ri>=0&&ri>oi){state.operatingMonth=real;state.selected=real;if(!state.plannedSpent[real])state.plannedSpent[real]={};save()}}
function spentMap(m){if(!state.plannedSpent[m])state.plannedSpent[m]={};return state.plannedSpent[m]}
function plannedSpentValue(m,k){return Math.min(money(state.base[k]),Math.max(0,money(spentMap(m)[k])))}
function setPlannedSpent(m,k,v){spentMap(m)[k]=Math.min(money(state.base[k]),Math.max(0,money(v)));save()}
function plannedRemaining(m){return BASES.reduce((s,[k])=>s+Math.max(0,money(state.base[k])-plannedSpentValue(m,k)),0)}
function plannedSpentTotal(m){return target()-plannedRemaining(m)}
function unreconciledExpenses(){return state.expenses.filter(e=>!e.reconciled).reduce((s,e)=>s+money(e.amount),0)}
function capital(){return Math.max(0,money(state.capitalSnapshot)-unreconciledExpenses())}
function futureReserve(){return Math.min(capital(),Math.max(0,money(state.futureReserveSnapshot)))}
function currentMonthPool(){return Math.max(0,capital()-futureReserve())}
function freeCapital(){return currentMonthPool()-plannedRemaining(state.operatingMonth)}
function commissionModel(){const allocated=Object.fromEntries(MONTHS.map(m=>[m,0])),distribution={},extraBySource={};MONTHS.forEach((m,i)=>{let rest=money(state.commissions[m]);const id='comm_'+i;distribution[id]=[];for(let j=i;j<=Math.min(i+3,MONTHS.length-1);j++){const month=MONTHS[j],need=Math.max(0,target()-money(state.fixed)-allocated[month]);const put=Math.min(rest,need);if(put>0)distribution[id].push({month,amount:put});allocated[month]+=put;rest-=put}extraBySource[id]=rest});const months=MONTHS.map((m,i)=>{const total=money(state.fixed)+allocated[m],missing=Math.max(0,target()-total);return{m,i,allocated:allocated[m],total,missing,covered:missing<=0,income:money(state.fixed)+money(state.commissions[m])}});return{months,distribution,extraBySource,extra:Object.values(extraBySource).reduce((s,x)=>s+money(x),0)}}
function activePage(){return document.querySelector('.tabs button.active')?.dataset.page||'home'}function setPage(p){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));render(p)}function changeMonth(n){state.selected=MONTHS[Math.max(0,Math.min(MONTHS.length-1,idx()+n))];save();render(activePage())}function goCurrent(){state.selected=state.operatingMonth;save();render(activePage())}
function monthNav(label){return `<div class="monthnav"><button onclick="changeMonth(-1)" ${idx()===0?'disabled':''}>‹</button><div class="monthbox"><small>${label}</small><b>${state.selected}</b>${state.selected!==state.operatingMonth?`<button class="secondary" style="margin-top:7px;padding:6px 9px;font-size:11px" onclick="goCurrent()">Mese attuale</button>`:''}</div><button onclick="changeMonth(1)" ${idx()===MONTHS.length-1?'disabled':''}>›</button></div>`}
function homeHTML(){const cm=commissionModel(),free=freeCapital(),remaining=plannedRemaining(state.operatingMonth),paid=plannedSpentTotal(state.operatingMonth),pool=currentMonthPool(),future=futureReserve(),win=cm.months.slice(opIdx(),opIdx()+4);return `${monthNav('Dashboard')}<section class="panel hero"><div class="eyebrow">Soldi disponibili da spendere</div><div class="amount ${free>=0?'positive':'negative'}">${euro(free)}</div><p>${free>=0?'Dopo aver protetto i mesi futuri e ciò che resta da pagare.':'Con i numeri inseriti mancano '+euro(Math.abs(free))+' per coprire tutti gli impegni residui.'}</p></section><section class="panel"><h2>Situazione reale</h2><div class="flow"><div class="flowrow"><span>Patrimonio attuale</span><b>${euro(capital())}</b></div><div class="flowarrow">↓</div><div class="flowrow"><span>Accantonato mesi futuri</span><b class="violet">− ${euro(future)}</b></div><div class="flowarrow">↓</div><div class="flowrow"><span>Disponibilità rimasta per luglio</span><b>${euro(pool)}</b></div><div class="flowarrow">↓</div><div class="flowrow"><span>Spese di luglio ancora da sostenere</span><b class="amber">− ${euro(remaining)}</b></div><div class="flowarrow">↓</div><div class="flowrow freebox"><span>Soldi disponibili</span><b class="${free>=0?'positive':'negative'}">${euro(free)}</b></div></div></section><div class="grid"><div class="card"><span>Già sostenuto a luglio</span><strong>${euro(paid)}</strong><small>Spese fisse già pagate o già assorbite.</small></div><div class="card"><span>Ancora da pagare</span><strong class="amber">${euro(remaining)}</strong><small>Benzina, pedaggi e assicurazione residui.</small></div><div class="card"><span>Disponibilità luglio</span><strong>${euro(pool)}</strong><small>Prima degli ultimi impegni.</small></div><div class="card"><span>Accantonato futuro</span><strong class="violet">${euro(future)}</strong><small>Agosto 600 · Settembre 600 · Ottobre 250.</small></div></div><section class="panel"><h2>Prossimi 4 mesi</h2>${win.map(x=>`<div class="row"><div><b>${x.m}</b><small>Fisso ${euro(state.fixed)} · provvigione prevista ${euro(state.commissions[x.m])} · quota assegnata ${euro(x.allocated)}</small></div><div class="right ${x.covered?'positive':'negative'}">${x.covered?'Coperto':'− '+euro(x.missing)}<small>${euro(x.total)}</small></div></div>`).join('')}</section>`}
function planHTML(){const p=commissionModel();return `${monthNav('Piano provvigioni')}<section class="panel"><h2>Inserisci provvigioni</h2><p>Ogni provvigione copre il mese di incasso e al massimo i tre successivi.</p>${MONTHS.slice(opIdx()).map((m,o)=>{const i=opIdx()+o,id='comm_'+i,d=p.distribution[id]||[],ex=p.extraBySource[id]||0;return `<div class="row"><div style="flex:1"><b>${m}</b><small>${d.length?d.map(x=>`${x.month}: ${euro(x.amount)}`).join('<br>'):'Nessuna distribuzione'}${ex?`<br><span class="violet">Extra: ${euro(ex)}</span>`:''}</small></div><div class="right"><input type="text" inputmode="decimal" style="width:115px;text-align:right" value="${state.commissions[m]||''}" placeholder="0" oninput="state.commissions['${m}']=Math.max(0,money(this.value));save()" onblur="render('plan')"></div></div>`}).join('')}</section><section class="panel"><h2>Copertura</h2>${p.months.slice(opIdx()).map(x=>`<div class="row"><div><b>${x.m}</b><small>Quota assegnata ${euro(x.allocated)} · totale ${euro(x.total)}</small></div><div class="right ${x.covered?'positive':'negative'}">${x.covered?'OK':'− '+euro(x.missing)}</div></div>`).join('')}</section>`}
function expensesHTML(){const rows=state.expenses.filter(e=>e.month===state.selected),cats=['Bar/ristoranti','Extra/acquisti','Regali','Casa','Auto','Salute','Altro'],colors=['#42d7d1','#65e99c','#f1c865','#ff7f87','#7bc4ff','#cbb8ff','#ffb86b'],total=rows.reduce((s,e)=>s+money(e.amount),0),group={};rows.forEach(e=>group[e.category]=(group[e.category]||0)+money(e.amount));let acc=0;const parts=Object.entries(group),grad=parts.length?'conic-gradient('+parts.map(([c,v],i)=>{const a=acc;acc+=(v/total)*360;return `${colors[i%colors.length]} ${a}deg ${acc}deg`}).join(',')+')':'conic-gradient(#17344a 0 360deg)',rem=plannedRemaining(state.selected),spent=plannedSpentTotal(state.selected);return `${monthNav('Spese')}<section class="panel"><h2>Spese previste di ${state.selected}</h2><p>Inserisci quanto hai già sostenuto. L’app calcola automaticamente solo la parte che manca.</p>${BASES.map(([k,l])=>{const previsto=money(state.base[k]),fatto=plannedSpentValue(state.selected,k),manca=Math.max(0,previsto-fatto);return `<div class="row"><div style="flex:1"><b>${l}</b><small>Previsto ${euro(previsto)} · manca <span class="${manca?'amber':'positive'}">${euro(manca)}</span></small></div><div class="right"><input inputmode="decimal" style="width:105px;text-align:right" value="${fatto}" onchange="setPlannedSpent('${state.selected}','${k}',this.value);render('expenses')"><small>già sostenuto</small></div></div>`}).join('')}<div class="notice">Già sostenuto: <b>${euro(spent)}</b><br>Ancora da sostenere: <b>${euro(rem)}</b></div></section><section class="panel"><h2>Spese impreviste</h2><div class="fields"><div class="field"><label>Categoria</label><select id="cat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="field"><label>Importo</label><input id="amount" inputmode="decimal" placeholder="es. 12,50"></div></div><div class="field" style="margin-top:10px"><label>Nota</label><input id="note" placeholder="facoltativa"></div><button class="primary" onclick="addExpense()">Aggiungi spesa</button></section><section class="panel"><h2>Riepilogo impreviste</h2><div class="summarywrap"><div class="donut" style="background:${grad}"><div class="hole"><span>Totale</span><strong>${euro(total)}</strong></div></div><div>${parts.map(([c,v],i)=>`<div class="legendrow"><div class="legendleft"><span class="dot" style="background:${colors[i%colors.length]}"></span><div class="legendtext"><b>${c}</b></div></div><div class="right">${euro(v)}</div></div>`).join('')||'<p>Nessuna spesa imprevista.</p>'}</div></div></section><section class="panel"><h2>Movimenti imprevisti</h2>${rows.slice().reverse().map(e=>`<div class="row"><div><b>${e.category}</b><small>${e.note||'Spesa imprevista'}</small></div><div class="right negative">−${euro(e.amount)}<br><button class="danger" onclick="removeExpense('${e.id}')">Elimina</button></div></div>`).join('')||'<p>Nessun movimento.</p>'}</section>`}
function baseHTML(){return `<section class="panel hero"><div class="eyebrow">Riconciliazione reale</div><div class="amount positive">${euro(capital())}</div><div class="fields" style="margin-top:15px"><div class="field"><label>Patrimonio attuale</label><input id="capitalNow" inputmode="decimal" value="${capital()}"><div class="hint">Ciò che possiedi realmente adesso.</div></div><div class="field"><label>Accantonato mesi futuri</label><input id="futureNow" inputmode="decimal" value="${futureReserve()}"><div class="hint">Denaro che non appartiene al mese corrente.</div></div></div><button class="primary" onclick="reconcile()">Salva situazione reale</button></section><section class="panel"><h2>Impostazioni principali</h2><div class="fields"><div class="field"><label>Mese operativo</label><select onchange="changeOperatingMonth(this.value)">${MONTHS.map(m=>`<option ${m===state.operatingMonth?'selected':''}>${m}</option>`).join('')}</select></div><div class="field"><label>Fisso mensile</label><input inputmode="decimal" value="${state.fixed}" oninput="state.fixed=Math.max(0,money(this.value));save()"></div></div></section><section class="panel"><h2>Spese previste mensili</h2>${BASES.map(([k,l])=>`<div class="row"><div><b>${l}</b><small>Importo mensile previsto</small></div><div class="right"><input inputmode="decimal" style="width:110px;text-align:right" value="${state.base[k]}" oninput="state.base['${k}']=Math.max(0,money(this.value));save()" onblur="render('base')"></div></div>`).join('')}<div class="notice">Totale mensile previsto: <b>${euro(target())}</b></div></section><section class="panel"><h2>Backup dati</h2><div class="grid"><button class="secondary" onclick="exportBackup()">Esporta backup</button><button class="secondary" onclick="document.getElementById('imp').click()">Importa backup</button></div><input id="imp" type="file" accept="application/json" style="display:none" onchange="importBackup(this.files[0])"></section><section class="panel"><h2>Ripristino</h2><button class="danger" onclick="resetAll()">Ripristina dati iniziali</button></section>`}
function addExpense(){const a=money(document.getElementById('amount').value);if(!a)return;state.expenses.push({id:'exp_'+Date.now(),createdAt:new Date().toISOString(),month:state.selected,category:document.getElementById('cat').value,amount:a,note:document.getElementById('note').value,reconciled:false});save();render('expenses')}function removeExpense(id){state.expenses=state.expenses.filter(e=>e.id!==id);save();render('expenses')}
function reconcile(){state.capitalSnapshot=Math.max(0,money(document.getElementById('capitalNow').value));state.futureReserveSnapshot=Math.max(0,money(document.getElementById('futureNow').value));state.expenses.forEach(e=>e.reconciled=true);save();render('base')}function changeOperatingMonth(m){state.operatingMonth=m;state.selected=m;if(!state.plannedSpent[m])state.plannedSpent[m]={};save();render('base')}
function exportBackup(){const b=new Blob([JSON.stringify({app:'Alex Finance',version:'4.3',exportedAt:new Date().toISOString(),data:state},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='alex-finance-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}function importBackup(f){if(!f)return;const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result),d=p.data||p;state={...clone(initial),...d,base:{...initial.base,...(d.base||{})},commissions:{...initial.commissions,...(d.commissions||{})},plannedSpent:d.plannedSpent||clone(initial.plannedSpent),expenses:Array.isArray(d.expenses)?d.expenses:[]};save();render('base');alert('Backup importato correttamente.')}catch(e){alert('Backup non valido.')}};r.readAsText(f)}function resetAll(){if(confirm('Ripristinare Alex Finance 5.0?')){state=clone(initial);save();render('home')}}
function render(p='home'){document.getElementById('view').innerHTML=p==='home'?homeHTML():p==='plan'?planHTML():p==='expenses'?expensesHTML():baseHTML()}document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>setPage(b.dataset.page)));syncOperatingMonth();render('home');
</script>
</body>
</html>
