<style>

*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -10%,#123d57 0,#071624 36%,var(--bg) 68%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}button,input,select{font:inherit}.app{max-width:720px;margin:auto;padding:18px 16px 112px}.top{display:flex;align-items:center;justify-content:space-between;margin:5px 0 16px}.brand{font-size:29px;font-weight:900;letter-spacing:-.065em}.brand span{color:var(--cyan)}.sub{color:var(--muted);font-size:12px;margin-top:6px}.iconbtn,.monthnav button{border:1px solid var(--line);background:#113149;color:var(--cyan);border-radius:15px;font-weight:900}.iconbtn{padding:11px 13px;font-size:17px}.panel{background:linear-gradient(145deg,rgba(16,43,62,.97),rgba(9,29,43,.98));border:1px solid rgba(65,113,145,.65);box-shadow:0 14px 35px rgba(0,0,0,.22);border-radius:24px;padding:18px;margin:13px 0}.hero{background:linear-gradient(145deg,#174761,#102b40)}.eyebrow{color:var(--cyan);font-size:10px;font-weight:900;letter-spacing:.13em;text-transform:uppercase}.amount{font-size:47px;line-height:1;font-weight:900;letter-spacing:-.065em;margin-top:10px}h2{font-size:22px;letter-spacing:-.04em;margin:0 0 8px}p{color:var(--muted);line-height:1.42;margin:7px 0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.card{background:rgba(6,24,37,.78);border:1px solid var(--line);border-radius:18px;padding:14px}.card span{display:block;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.07em;text-transform:uppercase}.card strong{display:block;font-size:22px;letter-spacing:-.04em;margin-top:7px}.card small{display:block;color:var(--muted);font-size:11px;line-height:1.35;margin-top:6px}.monthnav{display:grid;grid-template-columns:50px 1fr 50px;gap:9px;align-items:center;margin:5px 0 14px}.monthnav button{height:50px;font-size:28px}.monthnav button:disabled{opacity:.25}.monthbox{background:var(--panel);border:1px solid var(--line);border-radius:17px;padding:10px;text-align:center}.monthbox small{display:block;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.monthbox b{display:block;margin-top:3px;font-size:20px}.row{display:flex;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid rgba(49,88,113,.7)}.row:last-child{border-bottom:0}.row b{font-size:16px}.row small{display:block;color:var(--muted);margin-top:4px;line-height:1.35}.right{text-align:right;font-size:17px;font-weight:900;min-width:92px}.positive{color:var(--green)}.negative{color:var(--red)}.amber{color:var(--amber)}.violet{color:var(--violet)}.bar{height:9px;border-radius:999px;background:#06131f;overflow:hidden;margin-top:12px}.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--green))}.bar.warn i{background:linear-gradient(90deg,var(--cyan),var(--amber))}.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field label{display:block;color:var(--muted);font-size:10px;font-weight:900;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}input,select{width:100%;background:#071a29;color:var(--text);border:1px solid var(--line);border-radius:13px;padding:12px;font-size:16px;outline:none}.hint{font-size:11px;color:var(--muted);margin-top:5px}.primary,.secondary,.danger{border-radius:13px;font-weight:900}.primary{width:100%;border:0;padding:13px;background:var(--cyan);color:#06202d;margin-top:12px}.secondary{border:1px solid var(--line);background:#13374f;color:var(--cyan);padding:10px 12px}.danger{border:0;background:#57212b;color:#ffb6bc;padding:7px 9px;font-size:12px}.notice{background:#0d3342;border:1px solid #2e7382;border-radius:15px;padding:12px;color:#d7f2f2;font-size:13px;line-height:1.45;margin-top:11px}.progressline{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.summarywrap{display:grid;grid-template-columns:190px 1fr;gap:18px;align-items:center}.donut{width:184px;height:184px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line)}.donut .hole{width:112px;height:112px;border-radius:50%;background:#091e2d;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.donut span{color:var(--muted);font-size:10px;font-weight:900}.donut strong{font-size:22px}.legendrow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}.dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:4px}.legendleft{display:flex;gap:9px}.legendtext small{display:block;color:var(--muted);font-size:12px;margin-top:4px}.tabs{position:fixed;left:0;right:0;bottom:0;background:#071827ef;border-top:1px solid var(--line);backdrop-filter:blur(16px);display:flex;justify-content:center;gap:4px;padding:10px max(10px,env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));z-index:20}.tabs button{border:0;background:transparent;color:var(--muted);padding:12px 15px;border-radius:14px;font-size:14px;font-weight:900}.tabs button.active{background:#173b54;color:var(--cyan)}.version{text-align:center;color:#58778c;font-size:10px;margin:18px 0 0}@media(max-width:520px){.summarywrap{grid-template-columns:1fr}.donut{margin:auto}.amount{font-size:43px}}@media(max-width:390px){.app{padding-left:12px;padding-right:12px}.tabs button{padding:12px 10px}.fields{grid-template-columns:1fr}.amount{font-size:39px}.right{min-width:78px}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div><div class="brand">Alex <span>Finance</span></div><div class="sub">la tua libertà economica reale</div></div>
    <button class="iconbtn" type="button" onclick="setPage('base')">⚙︎</button>
  </div>
  <main id="view"></main>
  <div class="version">Alex Finance 5.1</div>
</div>
<nav class="tabs">
  <button type="button" data-page="home" class="active">Dashboard</button>
  <button type="button" data-page="plan">Piano</button>
  <button type="button" data-page="expenses">Spese</button>
  <button type="button" data-page="base">Base</button>
</nav>
<script>
'use strict';

const MONTHS = [
  'Luglio 2026','Agosto 2026','Settembre 2026','Ottobre 2026','Novembre 2026','Dicembre 2026',
  'Gennaio 2027','Febbraio 2027','Marzo 2027','Aprile 2027','Maggio 2027','Giugno 2027',
  'Luglio 2027','Agosto 2027','Settembre 2027','Ottobre 2027','Novembre 2027','Dicembre 2027'
];
const KEY = 'alex-finance-5-1-stabile';
const OLD_KEY = 'alex-finance-5-0-stabile';
const CATEGORY_DEFS = [
  ['benzina','Benzina'],
  ['pedaggi','Pedaggi'],
  ['assicurazione','Assicurazione auto'],
  ['bonifico','Bonifico personale'],
  ['cibo','Cibo'],
  ['servizi','Telefono, app e abbonamenti'],
  ['altre','Altre spese']
];
const COLORS = ['#47ddd5','#69eba0','#f2c965','#c9b6ff','#7bc4ff','#ff9b78','#ef8fc9'];

const initial = {
  operatingMonth: 'Luglio 2026',
  selectedMonth: 'Luglio 2026',
  capital: 1740,
  monthlyBudget: 1500,
  fixedIncome: 800,
  planned: {
    benzina:470,
    pedaggi:50,
    assicurazione:120,
    bonifico:275,
    cibo:250,
    servizi:50,
    altre:285
  },
  spentByMonth: {
    'Luglio 2026': {
      benzina:310,
      pedaggi:21,
      assicurazione:0,
      bonifico:275,
      cibo:250,
      servizi:0,
      altre:304
    }
  },
  commissions: Object.fromEntries(MONTHS.map(m => [m,0])),
  extraExpenses: []
};

function clone(value){ return JSON.parse(JSON.stringify(value)); }
function money(value){
  if(typeof value === 'number') return Number.isFinite(value) ? value : 0;
  let s = String(value ?? '').trim().replace(/\s/g,'');
  if(!s) return 0;
  if(s.includes(',') && s.includes('.')){
    s = s.lastIndexOf(',') > s.lastIndexOf('.') ? s.replace(/\./g,'').replace(',','.') : s.replace(/,/g,'');
  }else if(s.includes(',')){
    s = s.replace(',','.');
  }
  const n = Number(s);
  return Number.isFinite(n) ? n : 0;
}
function euro(value){
  return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:2}).format(money(value));
}
function clamp(value,min,max){ return Math.max(min,Math.min(max,value)); }
function monthIndex(month){ return MONTHS.indexOf(month); }
function operatingIndex(){ return Math.max(0,monthIndex(state.operatingMonth)); }
function selectedIndex(){ return Math.max(0,monthIndex(state.selectedMonth)); }

function categoryKeyFromLegacy(value){
  const text=String(value||'').toLowerCase();
  if(text.includes('benz')) return 'benzina';
  if(text.includes('pedagg') || text.includes('telepass')) return 'pedaggi';
  if(text.includes('assic')) return 'assicurazione';
  if(text.includes('bonifico') || text.includes('personale')) return 'bonifico';
  if(text.includes('cibo') || text.includes('aliment') || text.includes('ristor') || text.includes('bar')) return 'cibo';
  if(text.includes('serviz') || text.includes('telefono') || text.includes('app') || text.includes('abbon')) return 'servizi';
  return 'altre';
}
function normalizeState(raw){
  const s = {...clone(initial), ...(raw || {})};
  s.planned = {...initial.planned, ...(raw?.planned || {})};
  s.commissions = {...initial.commissions, ...(raw?.commissions || {})};
  s.spentByMonth = raw?.spentByMonth && typeof raw.spentByMonth === 'object' ? raw.spentByMonth : clone(initial.spentByMonth);
  s.extraExpenses = Array.isArray(raw?.extraExpenses) ? raw.extraExpenses.map((item,index)=>({
    id:item.id || 'exp_migrated_'+index+'_'+Date.now(),
    month:MONTHS.includes(item.month)?item.month:initial.operatingMonth,
    categoryKey:CATEGORY_DEFS.some(([key])=>key===item.categoryKey)?item.categoryKey:categoryKeyFromLegacy(item.category),
    amount:Math.max(0,money(item.amount)),
    note:String(item.note||''),
    createdAt:item.createdAt || new Date().toISOString()
  })) : [];
  s.operatingMonth = MONTHS.includes(s.operatingMonth) ? s.operatingMonth : initial.operatingMonth;
  s.selectedMonth = MONTHS.includes(s.selectedMonth) ? s.selectedMonth : s.operatingMonth;
  s.capital = Math.max(0,money(s.capital));
  s.monthlyBudget = Math.max(0,money(s.monthlyBudget));
  s.fixedIncome = Math.max(0,money(s.fixedIncome));
  return s;
}
function load(){
  try{
    const raw = localStorage.getItem(KEY) || localStorage.getItem(OLD_KEY);
    return raw ? normalizeState(JSON.parse(raw)) : clone(initial);
  }catch(error){
    console.error('Errore caricamento dati',error);
    return clone(initial);
  }
}
let state = load();
function save(){ localStorage.setItem(KEY,JSON.stringify(state)); }

function deviceMonth(){
  const label = new Date().toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  return label.charAt(0).toUpperCase()+label.slice(1);
}
function ensureMonth(month){
  if(!state.spentByMonth[month]) state.spentByMonth[month] = {};
  for(const [key] of CATEGORY_DEFS){
    if(!Number.isFinite(Number(state.spentByMonth[month][key]))) state.spentByMonth[month][key] = 0;
  }
}
function syncOperatingMonth(){
  const real = deviceMonth();
  const realIndex = monthIndex(real);
  if(realIndex >= 0 && realIndex > operatingIndex()){
    state.operatingMonth = real;
    state.selectedMonth = real;
    ensureMonth(real);
    save();
  }
}

function categorySpent(month,key){
  ensureMonth(month);
  return Math.max(0,money(state.spentByMonth[month][key]));
}
function categoryExtraSpent(month,key){
  return state.extraExpenses
    .filter(item => item.month===month && item.categoryKey===key)
    .reduce((sum,item)=>sum+money(item.amount),0);
}
function categoryTotalSpent(month,key){
  return categorySpent(month,key)+categoryExtraSpent(month,key);
}
function totalSpent(month){
  return CATEGORY_DEFS.reduce((sum,[key])=>sum+categoryTotalSpent(month,key),0);
}
function budgetRemaining(month){ return state.monthlyBudget - totalSpent(month); }
function futureMonthlyGap(){ return Math.max(0,state.monthlyBudget-state.fixedIncome); }

function allocationModel(){
  const needs = Object.fromEntries(MONTHS.map(month => [month, futureMonthlyGap()]));
  needs[state.operatingMonth] = Math.max(0,budgetRemaining(state.operatingMonth));
  const allocated = Object.fromEntries(MONTHS.map(month => [month,0]));
  const distributions = [];
  let extra = 0;

  function allocateSource(label,startIndex,amount,maxMonths){
    let rest = Math.max(0,money(amount));
    const parts = [];
    const end = Math.min(MONTHS.length-1,startIndex+maxMonths-1);
    for(let i=startIndex;i<=end && rest>0;i++){
      const month = MONTHS[i];
      const missing = Math.max(0,needs[month]-allocated[month]);
      const put = Math.min(rest,missing);
      if(put>0){
        allocated[month] += put;
        rest -= put;
        parts.push({month,amount:put});
      }
    }
    extra += rest;
    distributions.push({label,amount:money(amount),parts,extra:rest});
  }

  allocateSource('Patrimonio attuale',operatingIndex(),state.capital,4);
  MONTHS.forEach((month,index) => {
    const amount = money(state.commissions[month]);
    if(amount>0) allocateSource('Provvigione '+month,index,amount,4);
  });

  const months = MONTHS.map((month,index) => {
    const required = needs[month];
    const assigned = allocated[month];
    const fixed = index === operatingIndex() ? 0 : state.fixedIncome;
    const total = index === operatingIndex() ? assigned : fixed+assigned;
    const missing = Math.max(0,required-assigned);
    return {month,index,required,assigned,fixed,total,missing,covered:missing<=0};
  });
  return {needs,allocated,distributions,months,extra};
}

function currentAvailable(){
  const model = allocationModel();
  return model.allocated[state.operatingMonth] || 0;
}
function reservedFuture(){
  const model = allocationModel();
  return model.months.slice(operatingIndex()+1,operatingIndex()+4).reduce((sum,row) => sum + row.assigned,0);
}
function activePage(){ return document.querySelector('.tabs button.active')?.dataset.page || 'home'; }
function setPage(page){
  document.querySelectorAll('.tabs button').forEach(btn => btn.classList.toggle('active',btn.dataset.page===page));
  render(page);
}
function changeMonth(step){
  const next = clamp(selectedIndex()+step,0,MONTHS.length-1);
  state.selectedMonth = MONTHS[next];
  ensureMonth(state.selectedMonth);
  save();
  render(activePage());
}
function goCurrent(){ state.selectedMonth=state.operatingMonth;save();render(activePage()); }
function monthNav(label){
  return `<div class="monthnav">
    <button type="button" onclick="changeMonth(-1)" ${selectedIndex()===0?'disabled':''}>‹</button>
    <div class="monthbox"><small>${label}</small><b>${state.selectedMonth}</b>${state.selectedMonth!==state.operatingMonth?'<button type="button" class="secondary" style="margin-top:7px;padding:6px 9px;font-size:11px" onclick="goCurrent()">Mese attuale</button>':''}</div>
    <button type="button" onclick="changeMonth(1)" ${selectedIndex()===MONTHS.length-1?'disabled':''}>›</button>
  </div>`;
}

function homeHTML(){
  const model = allocationModel();
  const spent = totalSpent(state.operatingMonth);
  const available = currentAvailable();
  const reserved = reservedFuture();
  const progress = state.monthlyBudget>0 ? clamp((spent/state.monthlyBudget)*100,0,100) : 0;
  const next = model.months.slice(operatingIndex()+1,operatingIndex()+4);
  return `${monthNav('Dashboard')}
    <section class="panel hero">
      <div class="eyebrow">Soldi disponibili questo mese</div>
      <div class="amount ${available>=0?'positive':'negative'}">${euro(available)}</div>
      <p>È la parte del budget di ${state.operatingMonth} che puoi ancora utilizzare.</p>
    </section>
    <section class="panel">
      <div class="eyebrow">Budget ${state.operatingMonth}</div>
      <div class="amount" style="font-size:34px">${euro(state.monthlyBudget)} <span style="font-size:20px;color:var(--muted)">/</span> <span class="amber">${euro(available)}</span></div>
      <div class="grid" style="margin-top:14px">
        <div class="card"><span>Già speso</span><strong>${euro(spent)}</strong></div>
        <div class="card"><span>Ancora disponibile</span><strong class="amber">${euro(available)}</strong></div>
      </div>
      <div class="bar warn"><i style="width:${progress}%"></i></div>
    </section>
    <div class="grid">
      <div class="card"><span>Patrimonio attuale</span><strong>${euro(state.capital)}</strong><small>Situazione reale inserita nella pagina Base.</small></div>
      <div class="card"><span>Riservato al futuro</span><strong class="violet">${euro(reserved)}</strong><small>Quota assegnata ai prossimi mesi.</small></div>
      <div class="card"><span>Fisso mensile</span><strong>${euro(state.fixedIncome)}</strong><small>Entrata prevista ogni mese.</small></div>
      <div class="card"><span>Gap mensile</span><strong>${euro(futureMonthlyGap())}</strong><small>Quanto serve oltre al fisso per arrivare al budget.</small></div>
    </div>
    <section class="panel">
      <h2>Prossimi mesi</h2>
      ${next.map(row => `<div class="row"><div><b>${row.month}</b><small>Fisso ${euro(state.fixedIncome)} · riserva ${euro(row.assigned)}</small></div><div class="right ${row.covered?'positive':'negative'}">${row.covered?'Coperto':'− '+euro(row.missing)}<small>${euro(state.fixedIncome+row.assigned)}</small></div></div>`).join('')}
    </section>`;
}

function planHTML(){
  const model = allocationModel();
  return `${monthNav('Piano provvigioni')}
    <section class="panel">
      <h2>Inserisci provvigioni</h2>
      <p>Ogni provvigione copre il mese di incasso e al massimo i tre mesi successivi. Il surplus diventa Extra.</p>
      ${MONTHS.slice(operatingIndex()).map(month => `<div class="row"><div><b>${month}</b><small>Inserisci soltanto quando la provvigione viene realmente incassata.</small></div><div class="right"><input inputmode="decimal" style="width:115px;text-align:right" value="${state.commissions[month]||''}" placeholder="0" onchange="setCommission('${month}',this.value)"></div></div>`).join('')}
    </section>
    <section class="panel">
      <h2>Distribuzione</h2>
      ${model.distributions.map(source => `<div class="row"><div><b>${source.label}</b><small>${source.parts.length?source.parts.map(p => `${p.month}: ${euro(p.amount)}`).join('<br>'):'Nessuna quota assegnata'}${source.extra?`<br><span class="violet">Extra: ${euro(source.extra)}</span>`:''}</small></div><div class="right">${euro(source.amount)}</div></div>`).join('')}
    </section>
    <section class="panel">
      <h2>Copertura mensile</h2>
      ${model.months.slice(operatingIndex()).map(row => `<div class="row"><div><b>${row.month}</b><small>Fisso ${euro(row.fixed)} · quota assegnata ${euro(row.assigned)}</small></div><div class="right ${row.covered?'positive':'negative'}">${row.covered?'OK':'− '+euro(row.missing)}<small>${euro(row.total)}</small></div></div>`).join('')}
    </section>`;
}

function expenseBreakdown(month){
  return CATEGORY_DEFS
    .map(([key,label],i)=>({key,label,value:categoryTotalSpent(month,key),color:COLORS[i]}))
    .filter(item=>item.value>0);
}
function expensesHTML(){
  const month = state.selectedMonth;
  const breakdown = expenseBreakdown(month);
  const total = totalSpent(month);
  let angle = 0;
  const gradient = breakdown.length ? 'conic-gradient('+breakdown.map(item => {
    const start=angle;
    angle += total>0 ? (item.value/total)*360 : 0;
    return `${item.color} ${start}deg ${angle}deg`;
  }).join(',')+')' : 'conic-gradient(#17344a 0deg 360deg)';
  const movements = state.extraExpenses.filter(item=>item.month===month);
  return `${monthNav('Spese mensili')}
    <section class="panel">
      <h2>Spese di ${month}</h2>
      <p>Ogni nuova spesa resta nell’elenco e viene sommata automaticamente alla propria categoria.</p>
      ${CATEGORY_DEFS.map(([key,label]) => {
        const planned = money(state.planned[key]);
        const baseSpent = categorySpent(month,key);
        const movementsSpent = categoryExtraSpent(month,key);
        const spent = baseSpent+movementsSpent;
        const remaining = planned-spent;
        const pct = planned>0 ? clamp((spent/planned)*100,0,100) : 0;
        return `<div class="row"><div style="flex:1"><b>${label}</b><small>Totale ${euro(spent)} · base ${euro(baseSpent)}${movementsSpent?` · movimenti ${euro(movementsSpent)}`:''}<br>Previsto ${euro(planned)} · ${remaining>=0?'restano':'superato di'} <span class="${remaining>=0?'amber':'negative'}">${euro(Math.abs(remaining))}</span></small><div class="bar"><i style="width:${pct}%"></i></div></div><div class="right"><input inputmode="decimal" style="width:105px;text-align:right" value="${baseSpent}" onchange="setCategorySpent('${month}','${key}',this.value)"><small>base già spesa</small></div></div>`;
      }).join('')}
      <div class="notice">Totale speso: <b>${euro(total)}</b><br>Budget residuo: <b>${euro(state.monthlyBudget-total)}</b></div>
    </section>
    <section class="panel">
      <h2>Aggiungi spesa</h2>
      <div class="fields"><div class="field"><label>Categoria</label><select id="extraCat">${CATEGORY_DEFS.map(([key,label])=>`<option value="${key}">${label}</option>`).join('')}</select></div><div class="field"><label>Importo</label><input id="extraAmount" inputmode="decimal" placeholder="es. 12,50"></div></div>
      <div class="field" style="margin-top:10px"><label>Nota</label><input id="extraNote" placeholder="facoltativa"></div>
      <button type="button" class="primary" onclick="addExtraExpense()">Aggiungi spesa</button>
    </section>
    <section class="panel">
      <h2>Riepilogo per categoria</h2>
      <div class="summarywrap"><div class="donut" style="background:${gradient}"><div class="hole"><span>Totale</span><strong>${euro(total)}</strong></div></div><div>${breakdown.map(item => `<div class="legendrow"><div class="legendleft"><span class="dot" style="background:${item.color}"></span><div class="legendtext"><b>${item.label}</b><small>${euro(categorySpent(month,item.key))} base${categoryExtraSpent(month,item.key)?` + ${euro(categoryExtraSpent(month,item.key))} movimenti`:''}</small></div></div><div class="right">${euro(item.value)}</div></div>`).join('')||'<p>Nessuna spesa registrata.</p>'}</div></div>
    </section>
    <section class="panel">
      <h2>Movimenti individuali</h2>
      ${movements.slice().sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt))).map(item => {
        const label=CATEGORY_DEFS.find(([key])=>key===item.categoryKey)?.[1] || 'Altre spese';
        const date=new Date(item.createdAt);
        const dateLabel=Number.isNaN(date.getTime())?'':date.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
        return `<div class="row"><div><b>${label}</b><small>${dateLabel}${item.note?` · ${item.note}`:''}</small></div><div class="right negative">−${euro(item.amount)}<br><button type="button" class="danger" onclick="removeExtraExpense('${item.id}')">Elimina</button></div></div>`;
      }).join('')||'<p>Nessun movimento individuale.</p>'}
    </section>`;
}

function baseHTML(){
  const plannedTotal = CATEGORY_DEFS.reduce((sum,[key]) => sum+money(state.planned[key]),0);
  return `<section class="panel hero">
      <div class="eyebrow">Situazione reale</div><div class="amount positive">${euro(state.capital)}</div>
      <div class="fields" style="margin-top:15px"><div class="field"><label>Patrimonio attuale</label><input id="capitalInput" inputmode="decimal" value="${state.capital}"><div class="hint">Tutto ciò che possiedi realmente in questo momento.</div></div><div class="field"><label>Budget mensile</label><input id="budgetInput" inputmode="decimal" value="${state.monthlyBudget}"><div class="hint">Obiettivo mensile attuale.</div></div></div>
      <button type="button" class="primary" onclick="saveBaseNumbers()">Salva numeri reali</button>
    </section>
    <section class="panel"><h2>Impostazioni principali</h2><div class="fields"><div class="field"><label>Mese operativo</label><select onchange="changeOperatingMonth(this.value)">${MONTHS.map(m => `<option ${m===state.operatingMonth?'selected':''}>${m}</option>`).join('')}</select></div><div class="field"><label>Fisso mensile</label><input inputmode="decimal" value="${state.fixedIncome}" onchange="setFixedIncome(this.value)"></div></div></section>
    <section class="panel"><h2>Obiettivi di spesa</h2>${CATEGORY_DEFS.map(([key,label]) => `<div class="row"><div><b>${label}</b><small>Importo mensile di riferimento</small></div><div class="right"><input inputmode="decimal" style="width:110px;text-align:right" value="${state.planned[key]}" onchange="setPlanned('${key}',this.value)"></div></div>`).join('')}<div class="notice">Totale categorie: <b>${euro(plannedTotal)}</b><br>Budget mensile: <b>${euro(state.monthlyBudget)}</b></div></section>
    <section class="panel"><h2>Backup dati</h2><div class="grid"><button type="button" class="secondary" onclick="exportBackup()">Esporta backup</button><button type="button" class="secondary" onclick="document.getElementById('importFile').click()">Importa backup</button></div><input id="importFile" type="file" accept="application/json" style="display:none" onchange="importBackup(this.files[0])"></section>
    <section class="panel"><h2>Ripristino</h2><button type="button" class="danger" onclick="resetAll()">Ripristina Alex Finance 5.1</button></section>`;
}

function setCategorySpent(month,key,value){
  ensureMonth(month);
  const oldValue = categorySpent(month,key);
  const newValue = Math.max(0,money(value));
  const delta = newValue-oldValue;
  state.spentByMonth[month][key] = newValue;
  if(month===state.operatingMonth) state.capital = Math.max(0,state.capital-delta);
  save();render('expenses');
}
function setCommission(month,value){ state.commissions[month]=Math.max(0,money(value));save();render('plan'); }
function setPlanned(key,value){ state.planned[key]=Math.max(0,money(value));save();render('base'); }
function setFixedIncome(value){ state.fixedIncome=Math.max(0,money(value));save();render('base'); }
function addExtraExpense(){
  const amount = money(document.getElementById('extraAmount').value);
  if(amount<=0){ alert('Inserisci un importo valido.'); return; }
  const categoryKey=document.getElementById('extraCat').value;
  if(!CATEGORY_DEFS.some(([key])=>key===categoryKey)){ alert('Categoria non valida.'); return; }
  state.extraExpenses.push({
    id:'exp_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    month:state.selectedMonth,
    categoryKey,
    amount,
    note:document.getElementById('extraNote').value.trim(),
    createdAt:new Date().toISOString()
  });
  if(state.selectedMonth===state.operatingMonth) state.capital=Math.max(0,state.capital-amount);
  save();
  render('expenses');
}
function removeExtraExpense(id){
  const item = state.extraExpenses.find(x => x.id===id);
  if(item && item.month===state.operatingMonth) state.capital += money(item.amount);
  state.extraExpenses = state.extraExpenses.filter(x => x.id!==id);
  save();render('expenses');
}
function saveBaseNumbers(){
  state.capital=Math.max(0,money(document.getElementById('capitalInput').value));
  state.monthlyBudget=Math.max(0,money(document.getElementById('budgetInput').value));
  save();render('base');
}
function changeOperatingMonth(month){
  state.operatingMonth=month;
  state.selectedMonth=month;
  ensureMonth(month);
  save();render('base');
}
function exportBackup(){
  const blob = new Blob([JSON.stringify({app:'Alex Finance',version:'5.1',exportedAt:new Date().toISOString(),data:state},null,2)],{type:'application/json'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download='alex-finance-backup-'+new Date().toISOString().slice(0,10)+'.json';
  link.click();
  setTimeout(()=>URL.revokeObjectURL(link.href),1000);
}
function importBackup(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      state=normalizeState(parsed.data||parsed);
      save();render('base');alert('Backup importato correttamente.');
    }catch(error){ alert('Il file di backup non è valido.'); }
  };
  reader.readAsText(file);
}
function resetAll(){
  if(confirm('Ripristinare tutti i dati iniziali di Alex Finance 5.1?')){
    state=clone(initial);save();render('home');
  }
}
function render(page='home'){
  const view=document.getElementById('view');
  if(!view) return;
  view.innerHTML = page==='home' ? homeHTML() : page==='plan' ? planHTML() : page==='expenses' ? expensesHTML() : baseHTML();
}

document.querySelectorAll('.tabs button').forEach(button => button.addEventListener('click',()=>setPage(button.dataset.page)));
syncOperatingMonth();
ensureMonth(state.operatingMonth);
render('home');
</script>
</body>
</html>
