<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071320" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alex Finance" />
  <title>Alex Finance</title>
  <style>
    :root{--bg:#071320;--panel:#102234;--panel2:#122a3f;--line:#274861;--text:#f4f8fb;--muted:#9bb1c3;--cyan:#45d7d2;--green:#5ee38d;--amber:#ffc766;--red:#ff7d7d;--blue:#5aa9ff;--purple:#bb8cff}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 80% 0,#15385a 0,transparent 37%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,Arial,sans-serif;min-height:100vh}
    .app{max-width:700px;margin:0 auto;padding:env(safe-area-inset-top) 16px calc(88px + env(safe-area-inset-bottom))}
    header{padding:18px 0 12px;display:flex;justify-content:space-between;align-items:center}.brand small{display:block;color:var(--cyan);letter-spacing:.12em;font-weight:800;font-size:10px}.brand h1{margin:3px 0 0;font-size:28px;letter-spacing:-.04em}.status{font-size:11px;color:var(--green);background:#11352b;padding:7px 10px;border-radius:999px;border:1px solid #236a52}
    .hero{background:linear-gradient(135deg,#153b58,#102638);border:1px solid var(--line);border-radius:22px;padding:18px;margin-top:6px;box-shadow:0 16px 44px #0005}.hero label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.1em}.hero .amount{font-size:40px;font-weight:800;margin:7px 0 5px;letter-spacing:-.05em}.hero .caption{color:var(--muted);font-size:13px}.positive{color:var(--green)}.negative{color:var(--red)}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}.extra-card{background:linear-gradient(135deg,#2a1d4d,#172846);border-color:#6c55a9}.extra-card strong{color:#d6c3ff}.extra-badge{display:inline-block;background:#34235c;color:#dacaff;border:1px solid #7156ad;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:800;margin:3px 0 10px}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}.card span{color:var(--muted);font-size:11px;display:block;font-weight:700}.card strong{font-size:21px;display:block;margin-top:5px;letter-spacing:-.03em}
    .tabs{display:flex;gap:8px;overflow:auto;padding:6px 0 12px;scrollbar-width:none}.tabs button{white-space:nowrap;border:1px solid var(--line);color:var(--muted);background:#0c1d2d;padding:10px 12px;border-radius:13px;font-weight:750}.tabs button.active{background:var(--cyan);color:#052023;border-color:var(--cyan)}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:12px}.panel h2{font-size:16px;margin:0 0 5px;letter-spacing:-.02em}.panel p{color:var(--muted);font-size:12px;line-height:1.45;margin:0 0 14px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid #234055}.row:last-child{border:0}.row .left b{display:block;font-size:14px}.row .left small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.row .right{text-align:right;font-weight:800}.row .right small{display:block;font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
    .barwrap{margin-top:6px}.barline{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}.bar{height:9px;background:#0a1825;border-radius:99px;overflow:hidden}.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:99px}
    .primary,.secondary,.danger{border:0;border-radius:14px;padding:13px 14px;font-weight:850;font-size:14px;cursor:pointer}.primary{background:var(--cyan);color:#062027;width:100%}.secondary{background:#18354b;border:1px solid var(--line);color:#e5f4fb}.danger{background:#421f26;color:#ffb4b4;border:1px solid #78313d}.buttonrow{display:flex;gap:8px}.buttonrow>*{flex:1}
    .inputrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field label{display:block;font-size:11px;color:var(--muted);font-weight:800;margin:0 0 6px}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:#091927;color:var(--text);font-size:16px;font-weight:700}.field input:focus,.field select:focus{outline:2px solid #45d7d255}.hint{font-size:11px;color:var(--muted);margin-top:8px}.hide{display:none!important}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#081826eF;border-top:1px solid var(--line);backdrop-filter:blur(14px);display:flex;justify-content:center;padding:8px max(12px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom));z-index:10}.navinner{display:flex;max-width:700px;width:100%;gap:6px}.nav button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px 4px;border-radius:12px;font-size:11px;font-weight:750}.nav button.active{background:#17374d;color:var(--cyan)}
    .monthpill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:#0d2434;color:var(--cyan);font-size:11px;font-weight:800;margin:5px 0 12px}.footnote{font-size:10px;color:var(--muted);text-align:center;margin:16px 0}.legend{display:flex;gap:10px;font-size:10px;color:var(--muted);margin-top:10px}.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}.green{background:var(--green)}.amber{background:var(--amber)}.red{background:var(--red)}
  </style>
</head>
<body>
<div class="app">
  <header><div class="brand"><small>PERSONAL FINANCE OS</small><h1>Alex Finance</h1></div><div class="status">● Salvato sul telefono</div></header>
  <main id="view"></main>
</div>
<nav class="nav"><div class="navinner">
  <button data-page="home" class="active">Dashboard</button><button data-page="months">Mesi</button><button data-page="expenses">Spese</button><button data-page="settings">Base</button>
</div></nav>
<script>
const MONTHS=["Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const KEY='alex-finance-v1';
const defaultState={fixed:800,vital:{benzina:476,pedaggi:50,assicurazione:106,bonifico:275,cibo:250,app:58,altri:35,cuscinetto:150},commissions:{Luglio:0,Agosto:0,Settembre:0,Ottobre:0,Novembre:0,Dicembre:0},expenses:[],selected:'Luglio'};
let state=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(defaultState);
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function euro(n){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Number(n)||0)}
function vitalTotal(){const v=state.vital;return Object.keys(v).filter(k=>k!=='cuscinetto').reduce((a,k)=>a+(Number(v[k])||0),0)}
function target(){return vitalTotal()+(Number(state.vital.cuscinetto)||0)}
function model(){
  const alloc=Object.fromEntries(MONTHS.map(m=>[m,0]));
  const source={}; const reserve={};
  MONTHS.forEach((src,si)=>{let rem=Math.max(0,Number(state.commissions[src])||0);source[src]={};for(let ti=si;ti<=Math.min(si+3,MONTHS.length-1);ti++){const m=MONTHS[ti];const need=Math.max(0,target()-(Number(state.fixed)||800)-alloc[m]);const put=Math.min(rem,need);alloc[m]+=put;source[src][m]=put;rem-=put;}reserve[src]=rem;});
  return {alloc,source,reserve};
}
function extraFund(){const x=model();return MONTHS.reduce((sum,m)=>sum+(Number(x.reserve[m])||0),0)}
function monthPlan(m){const x=model();const idx=MONTHS.indexOf(m);const allocated=x.alloc[m];return {fixed:Number(state.fixed)||800,allocated,total:(Number(state.fixed)||800)+allocated,target:target(),margin:(Number(state.fixed)||800)+allocated-target(),source:x.source, reserve:x.reserve,idx};}
function monthlyExpense(m){return state.expenses.filter(x=>x.month===m).reduce((a,x)=>a+(Number(x.amount)||0),0)}
function setPage(page){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));render(page)}
function render(page='home'){
 const view=document.getElementById('view');
 if(page==='home') view.innerHTML=homeHTML();
 if(page==='months') view.innerHTML=monthsHTML();
 if(page==='expenses') view.innerHTML=expensesHTML();
 if(page==='settings') view.innerHTML=settingsHTML();
 bind(page);
}
function homeHTML(){const p=monthPlan(state.selected), protected=MONTHS.filter(m=>monthPlan(m).margin>=0).length; const spent=monthlyExpense(state.selected); const pct=Math.min(100,Math.max(0,p.total/p.target*100)); const extra=extraFund(); const x=model(); const extraRows=MONTHS.filter(m=>(x.reserve[m]||0)>0).map(m=>`<div class="row"><div class="left"><b>Extra dalla provvigione di ${m}</b><small>Non usato perché la provvigione si ferma al 4° mese</small></div><div class="right positive">${euro(x.reserve[m])}</div></div>`).join(''); return `
 <div class="monthpill">${state.selected} 2026</div>
 <section class="hero"><label>DISPONIBILITÀ PROGRAMMATA</label><div class="amount ${p.margin>=0?'positive':'negative'}">${euro(p.total)}</div><div class="caption">Target ${euro(p.target)} · margine ${euro(p.margin)}</div><div class="barwrap"><div class="barline"><span>Copertura target</span><span>${Math.round(pct)}%</span></div><div class="bar"><i style="width:${pct}%"></i></div></div></section>
 <div class="grid"><div class="card"><span>Spesa vitale</span><strong>${euro(vitalTotal())}</strong></div><div class="card"><span>Mesi a target</span><strong>${protected}/6</strong></div><div class="card"><span>Spese reali ${state.selected}</span><strong>${euro(spent)}</strong></div><div class="card"><span>Resto programmato</span><strong class="${p.total-spent>=0?'positive':'negative'}">${euro(p.total-spent)}</strong></div></div>
 <section class="panel extra-card"><span class="extra-badge">RISERVA SEPARATA</span><h2>Extra oltre i 4 mesi</h2><div class="amount positive" style="font-size:32px;margin:4px 0 6px">${euro(extra)}</div><p>Questo importo non viene distribuito automaticamente dopo il quarto mese. Rimane separato come fondo extra disponibile.</p>${extraRows||'<p>Nessun extra ancora: quando una provvigione supera ciò che serve per i suoi 4 mesi, lo vedrai qui.</p>'}</section>
 <section class="panel"><h2>Piano luglio → dicembre</h2><p>Ogni provvigione copre prima il mese corrente e poi i tre successivi. Non va oltre 4 mesi.</p>${MONTHS.map(m=>monthRow(m)).join('')}</section>
 <section class="panel"><h2>Cosa fare adesso</h2><p>Apri il mese corrente, inserisci la provvigione. L’allocazione cambia subito.</p><button class="primary" onclick="setPage('months')">Apri i mesi</button></section>`}
function monthRow(m){const p=monthPlan(m), pct=Math.min(100,Math.max(0,p.total/p.target*100)); return `<div class="row"><div class="left"><b>${m}</b><small>${p.margin>=0?'Target raggiunto':'Da coprire '+euro(-p.margin)}</small></div><div class="right ${p.margin>=0?'positive':'negative'}">${euro(p.total)}<small>su ${euro(p.target)}</small></div></div><div class="bar" style="margin:-4px 0 9px"><i style="width:${pct}%"></i></div>`}
function monthsHTML(){const extra=extraFund();return `<div class="monthpill">Inserisci soltanto la provvigione</div><section class="panel"><h2>Provvigioni 2026</h2><p>Il fisso è già ${euro(state.fixed)}. Quando scrivi un importo, il piano distribuisce automaticamente fino a 4 mesi consecutivi.</p>${MONTHS.map((m,i)=>monthInput(m,i)).join('')}</section><section class="panel extra-card"><span class="extra-badge">RISERVA SEPARATA</span><h2>Extra totale disponibile</h2><div class="amount positive" style="font-size:30px;margin:4px 0 6px">${euro(extra)}</div><p>È tutto ciò che resta dopo aver protetto al massimo i 4 mesi consentiti per ogni provvigione. Non viene spostato automaticamente oltre il limite.</p></section><section class="panel"><h2>Come viene spostata la provvigione</h2><p>Vedi quanto viene assegnato ai quattro mesi e quanto resta come extra.</p>${MONTHS.map(m=>sourceDetail(m)).join('')}</section>`}
function monthInput(m,i){const p=monthPlan(m);return `<div class="row"><div class="left"><b>${m}</b><small>Fisso ${euro(state.fixed)} · target ${euro(p.target)}</small></div><div class="right"><input aria-label="Provvigione ${m}" style="width:120px;text-align:right;border:1px solid var(--line);border-radius:10px;padding:9px;background:#fff2cc;color:#152b3e;font-weight:800;font-size:15px" type="number" min="0" step="50" value="${state.commissions[m]||''}" placeholder="0" oninput="updateCommission('${m}',this.value)" onchange="refreshMonths()" onblur="refreshMonths()"><small>provvigione</small></div></div>`}
function sourceDetail(src){const x=model();const val=Number(state.commissions[src])||0;if(!val)return '';const si=MONTHS.indexOf(src);const rows=[];for(let ti=si;ti<=Math.min(si+3,MONTHS.length-1);ti++){const m=MONTHS[ti],n=x.source[src][m]||0;if(n>0)rows.push(`${m}: <b>${euro(n)}</b>`)}return `<div class="row"><div class="left"><b>${src} · ${euro(val)}</b><small>${rows.join(' · ')||'Nessuna quota necessaria'}</small></div><div class="right ${x.reserve[src]>0?'positive':''}">${x.reserve[src]>0?euro(x.reserve[src]):''}<small>${x.reserve[src]>0?'EXTRA separato, non oltre 4 mesi':''}</small></div></div>`}
function expensesHTML(){const cats=['Benzina','Pedaggi','Assicurazione','Bonifico personale','Cibo','Telefono/app/banca','Bar/ristoranti','Extra/acquisti','Altro'];const current=state.expenses.filter(x=>x.month===state.selected);const by={};cats.forEach(c=>by[c]=0);current.forEach(e=>by[e.category]=(by[e.category]||0)+Number(e.amount));return `<div class="monthpill">${state.selected} 2026</div><section class="panel"><h2>Aggiungi spesa</h2><div class="inputrow"><div class="field"><label>Categoria</label><select id="expCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="field"><label>Importo</label><input id="expAmount" type="number" min="0" step="1" placeholder="0"></div></div><div class="inputrow" style="margin-top:10px"><div class="field"><label>Mese</label><select id="expMonth">${MONTHS.map(m=>`<option ${m===state.selected?'selected':''}>${m}</option>`).join('')}</select></div><div class="field"><label>Nota</label><input id="expNote" placeholder="facoltativa"></div></div><button class="primary" style="margin-top:12px" onclick="addExpense()">Aggiungi spesa</button></section><section class="panel"><h2>Dove spendi</h2>${cats.filter(c=>by[c]>0).map(c=>`<div class="row"><div class="left"><b>${c}</b></div><div class="right">${euro(by[c])}</div></div>`).join('')||'<p>Nessuna spesa registrata per questo mese.</p>'}</section><section class="panel"><h2>Ultimi movimenti</h2>${state.expenses.slice().reverse().slice(0,8).map((e,i)=>`<div class="row"><div class="left"><b>${e.category}</b><small>${e.month}${e.note?' · '+e.note:''}</small></div><div class="right negative">-${euro(e.amount)}<small><button class="danger" style="padding:4px 7px;font-size:10px" onclick="deleteExpense(${state.expenses.length-1-i})">elimina</button></small></div></div>`).join('')||'<p>Nessun movimento ancora.</p>'}</section>`}
function settingsHTML(){const v=state.vital;const fields=[['benzina','Benzina'],['pedaggi','Pedaggi'],['assicurazione','Assicurazione auto'],['bonifico','Bonifico personale'],['cibo','Cibo essenziale'],['app','Telefono, app, banca'],['altri','Altri minimi'],['cuscinetto','Cuscinetto']];return `<section class="panel"><h2>Base mensile</h2><p>Modifica qui solo le spese fisse o il cuscinetto. Il target si aggiorna subito.</p><div class="inputrow"><div class="field"><label>Fisso Tecnocasa</label><input id="fixedInput" type="number" value="${state.fixed}" oninput="updateFixed(this.value)"></div><div class="field"><label>Target attuale</label><input value="${euro(target())}" disabled></div></div>${fields.map(([k,l])=>`<div class="row"><div class="left"><b>${l}</b></div><div class="right"><input style="width:105px;text-align:right;border:1px solid var(--line);border-radius:10px;padding:8px;background:#fff2cc;color:#152b3e;font-weight:800" type="number" value="${v[k]}" oninput="updateVital('${k}',this.value)"></div></div>`).join('')}<div class="buttonrow" style="margin-top:14px"><button class="secondary" onclick="exportData()">Esporta backup</button><button class="danger" onclick="resetAll()">Azzera dati</button></div></section><div class="footnote">I dati restano solo sul tuo telefono in questa prima versione.</div>`}
function updateCommission(m,v){state.commissions[m]=Math.max(0,Number(v)||0);save()}
function refreshMonths(){render('months')}
function updateFixed(v){state.fixed=Math.max(0,Number(v)||0);save();render('settings')}
function updateVital(k,v){state.vital[k]=Math.max(0,Number(v)||0);save();render('settings')}
function addExpense(){const amount=Number(document.getElementById('expAmount').value)||0;if(!amount)return;state.expenses.push({category:document.getElementById('expCat').value,amount,month:document.getElementById('expMonth').value,note:document.getElementById('expNote').value,created:Date.now()});save();render('expenses')}
function deleteExpense(i){state.expenses.splice(i,1);save();render('expenses')}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='alex-finance-backup.json';a.click();URL.revokeObjectURL(a.href)}
function resetAll(){if(confirm('Vuoi azzerare tutti i dati salvati sul telefono?')){state=structuredClone(defaultState);save();render('home')}}
document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>setPage(b.dataset.page)));render('home');
</script>
</body></html>
